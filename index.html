<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Progress Tracker</title>
  <meta name="description" content="A log of AI tools and techniques in practice">
  <meta property="og:title" content="AI Progress Tracker">
  <meta property="og:description" content="A log of AI tools and techniques in practice">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://notthatsamjones.github.io/ai-progress-tracker/">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #666;
      font-size: 0.95rem;
    }

    .year-section {
      margin-bottom: 2.5rem;
    }

    .year-heading {
      font-size: 1.25rem;
      font-weight: 700;
      color: #333;
      border-bottom: 2px solid #e5e5e5;
      padding-bottom: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .entry {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1px solid #eaeaea;
      border-radius: 6px;
    }

    .entry-date {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .entry-text {
      font-size: 0.95rem;
      color: #1a1a1a;
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15em 0.55em;
      border-radius: 3px;
      margin-left: 0.35em;
      vertical-align: middle;
      letter-spacing: 0.02em;
    }

    /* Tag colors - muted professional palette */
    .tag-ai-tools { background: #dbeafe; color: #1e40af; }
    .tag-vibecoding { background: #ede9fe; color: #5b21b6; }
    .tag-analytics { background: #d1fae5; color: #065f46; }
    .tag-community { background: #fef3c7; color: #92400e; }
    .tag-research { background: #e0e7ff; color: #3730a3; }
    .tag-automation { background: #cffafe; color: #155e75; }
    .tag-ai-browser { background: #fce7f3; color: #9d174d; }
    .tag-integration { background: #f3e8ff; color: #6b21a8; }
    .tag-prototype { background: #ccfbf1; color: #134e4a; }
    .tag-analysis { background: #fef9c3; color: #854d0e; }
    .tag-design { background: #fbcfe8; color: #831843; }
    .tag-engcollab { background: #e2e8f0; color: #334155; }
    .tag-synthesis { background: #ddd6fe; color: #4c1d95; }
    .tag-imagegen { background: #ffe4e6; color: #9f1239; }
    .tag-architect { background: #d1d5db; color: #374151; }
    .tag-sideproject { background: #fed7aa; color: #9a3412; }
    .tag-contexteng { background: #bfdbfe; color: #1e3a8a; }
    .tag-ai-assisteddev { background: #c7d2fe; color: #3730a3; }
    .tag-evaluation { background: #fde68a; color: #78350f; }
    .tag-monitoring { background: #a7f3d0; color: #064e3b; }
    .tag-ai-feature-design { background: #e9d5ff; color: #581c87; }
    .tag-learning { background: #fecaca; color: #991b1b; }
    .tag-designsystem { background: #f9a8d4; color: #701a75; }
    .tag-prototyping { background: #99f6e4; color: #115e59; }

    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e5e5;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI Progress Tracker</h1>
      <p>A log of AI tools and techniques in practice</p>
    </header>
    <main>
      
    </main>
    <footer>
      Last updated March 01, 2026
    </footer>
  </div>
</body>
</html>
